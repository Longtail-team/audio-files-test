<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: transparent; padding: 0; }

  .apl { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; }

  /* 다크모드 */
  @media (prefers-color-scheme: dark) {
    .apl { background: #1e1e1e; border-color: #3a3a3a; color: #e5e5e5; }
    .apl-meta { color: #9ca3af !important; }
    .apl-time { color: #9ca3af !important; }
    .apl-sep  { background: #1e1e1e !important; }
    .apl-cdur { color: #9ca3af !important; }
    .apl-crow:hover, .apl-crow.act { background: rgba(255,255,255,.08) !important; }
    .apl-pbtn { border-color: rgba(255,255,255,.2) !important; color: #e5e5e5 !important; }
    .apl-pbtn:hover { background: rgba(255,255,255,.08) !important; }
    .apl-trk  { background: rgba(255,255,255,.15) !important; }
  }

  .apl-title { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
  .apl-meta  { font-size: 12px; color: #6b7280; margin: 0 0 16px; }

  .apl-pw  { position: relative; height: 30px; cursor: pointer; display: flex; align-items: center; }
  .apl-trk { position: relative; width: 100%; height: 4px; background: rgba(128,128,128,.2); border-radius: 2px; transition: height .1s; }
  .apl-pw:hover .apl-trk { height: 6px; }
  .apl-cseg  { position: absolute; top: 0; height: 100%; border-radius: 2px; }
  .apl-fill  { position: absolute; left: 0; top: 0; height: 100%; background: #ff0000; border-radius: 2px 0 0 2px; pointer-events: none; }
  .apl-thumb { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 13px; height: 13px; background: #fff; border: 2px solid #ff0000; border-radius: 50%; pointer-events: none; opacity: 0; transition: opacity .1s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .apl-pw:hover .apl-thumb { opacity: 1; }
  .apl-sep   { position: absolute; top: 50%; transform: translateY(-50%); width: 2px; height: 140%; background: #fff; pointer-events: none; z-index: 2; }
  .apl-tip   { position: absolute; bottom: calc(100% + 10px); transform: translateX(-50%); background: rgba(0,0,0,.82); color: #fff; font-size: 11px; white-space: nowrap; padding: 4px 8px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity .1s; z-index: 10; }

  .apl-ctrl { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  .apl-pbtn { width: 36px; height: 36px; border: 1px solid rgba(128,128,128,.3); border-radius: 50%; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #111; flex-shrink: 0; transition: background .12s; }
  .apl-pbtn:hover { background: rgba(128,128,128,.1); }
  .apl-pbtn:active { transform: scale(.96); }
  .apl-time { font-size: 13px; color: #6b7280; font-variant-numeric: tabular-nums; }
  .apl-vw   { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .apl-vi   { font-size: 14px; cursor: pointer; }
  .apl-vr   { width: 72px; accent-color: #ff0000; }

  .apl-clist { margin-top: 16px; border-top: 1px solid rgba(128,128,128,.15); padding-top: 12px; display: flex; flex-direction: column; gap: 2px; }
  .apl-crow  { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; cursor: pointer; transition: background .1s; }
  .apl-crow:hover, .apl-crow.act { background: rgba(128,128,128,.1); }
  .apl-cdot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .apl-cts   { font-size: 12px; color: #ff0000; min-width: 38px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .apl-cname { font-size: 13px; flex: 1; }
  .apl-cdur  { font-size: 11px; color: #6b7280; margin-left: auto; }
</style>
</head>
<body>

<div class="apl">
  <p class="apl-title" id="apl-title">트랙 제목을 여기에 입력하세요</p>
  <p class="apl-meta"  id="apl-meta">아티스트 · 앨범 · 2025</p>

  <div class="apl-pw" id="apl-pw">
    <div class="apl-trk" id="apl-trk">
      <div class="apl-fill"  id="apl-fill"  style="width:0%"></div>
      <div class="apl-thumb" id="apl-thumb" style="left:0%"></div>
      <div class="apl-tip"   id="apl-tip"></div>
    </div>
  </div>

  <div class="apl-ctrl">
    <button class="apl-pbtn" id="apl-pbtn" aria-label="재생/일시정지">
      <svg id="apl-ico" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <polygon points="3,1 14,8 3,15"/>
      </svg>
    </button>
    <span class="apl-time">
      <span id="apl-cur">0:00</span> / <span id="apl-dur">0:00</span>
    </span>
    <div class="apl-vw">
      <span class="apl-vi" id="apl-vi">🔊</span>
      <input type="range" class="apl-vr" id="apl-vr" min="0" max="1" step="0.01" value="1">
    </div>
  </div>

  <div class="apl-clist" id="apl-clist"></div>
</div>

<audio id="apl-audio" preload="metadata"></audio>

<script>
(function () {

  /* ════════════════════════════════════════
     ✏️  여기만 수정하세요
  ════════════════════════════════════════ */

  // URL 파라미터로 받거나, 없으면 아래 기본값 사용
  // 사용 예: player.html?src=음원URL&title=곡제목&meta=아티스트
  var params    = new URLSearchParams(window.location.search);
  var TITLE     = params.get("title") || "Robin Hill School Book 1";
  var META      = params.get("meta")  || "Robin Hill School · 2025";
  var AUDIO_SRC = params.get("src")   || "https://drive.google.com/uc?export=download&id=1UggQB_1Xge_GVAYeYBsRMEi1FL_3VnPn";

  // 전체 길이(초) — 오디오 로드 후 자동 갱신됨
  var TOTAL = 300;

  // 챕터가 필요 없으면 아래처럼 빈 배열로 두세요
  var chapters = [
    // { name: "인트로", start: 0,  color: "#ff0000" },
    // { name: "챕터1", start: 30, color: "#ff4d4d" },
  ];

  /* ════════════════════════════════════════
     ⚙️  아래는 수정 불필요
  ════════════════════════════════════════ */

  document.getElementById("apl-title").textContent = TITLE;
  document.getElementById("apl-meta").textContent  = META;

  var audio  = document.getElementById("apl-audio");
  var fill   = document.getElementById("apl-fill");
  var thumb  = document.getElementById("apl-thumb");
  var tip    = document.getElementById("apl-tip");
  var trk    = document.getElementById("apl-trk");
  var pw     = document.getElementById("apl-pw");
  var pbtn   = document.getElementById("apl-pbtn");
  var curEl  = document.getElementById("apl-cur");
  var durEl  = document.getElementById("apl-dur");
  var vr     = document.getElementById("apl-vr");
  var vi     = document.getElementById("apl-vi");
  var clist  = document.getElementById("apl-clist");

  audio.src = AUDIO_SRC;

  function fmt(s) {
    s = Math.floor(s);
    return Math.floor(s / 60) + ":" + (s % 60 < 10 ? "0" : "") + (s % 60);
  }

  function getCh(t) {
    var idx = 0;
    for (var i = 0; i < chapters.length; i++) { if (t >= chapters[i].start) idx = i; }
    return idx;
  }

  audio.addEventListener("loadedmetadata", function () {
    TOTAL = audio.duration || TOTAL;
    durEl.textContent = fmt(TOTAL);
    buildSegments();
  });
  durEl.textContent = fmt(TOTAL);

  function buildSegments() {
    trk.querySelectorAll(".apl-cseg, .apl-sep").forEach(function (el) { el.remove(); });
    if (chapters.length === 0) return;
    chapters.forEach(function (ch, i) {
      var next = chapters[i + 1] ? chapters[i + 1].start : TOTAL;
      var seg = document.createElement("div");
      seg.className = "apl-cseg";
      seg.style.cssText = "left:" + (ch.start / TOTAL * 100).toFixed(2) + "%;width:" + ((next - ch.start) / TOTAL * 100).toFixed(2) + "%;background:" + ch.color + ";opacity:.7";
      trk.appendChild(seg);
      if (i > 0) {
        var sep = document.createElement("div");
        sep.className = "apl-sep";
        sep.style.left = (ch.start / TOTAL * 100).toFixed(2) + "%";
        trk.appendChild(sep);
      }
    });
  }

  chapters.forEach(function (ch, i) {
    var next = chapters[i + 1] ? chapters[i + 1].start : TOTAL;
    var row = document.createElement("div");
    row.className = "apl-crow";
    row.id = "apl-ch-" + i;
    row.innerHTML =
      '<div class="apl-cdot" style="background:' + ch.color + '"></div>' +
      '<span class="apl-cts">' + fmt(ch.start) + '</span>' +
      '<span class="apl-cname">' + ch.name + '</span>' +
      '<span class="apl-cdur">' + fmt(next - ch.start) + '</span>';
    row.addEventListener("click", function () {
      audio.currentTime = ch.start;
      if (audio.paused) audio.play();
    });
    clist.appendChild(row);
  });

  buildSegments();

  function updateProgress(t) {
    var pct = (t / TOTAL * 100).toFixed(3) + "%";
    fill.style.width  = pct;
    thumb.style.left  = pct;
    curEl.textContent = fmt(t);
    if (chapters.length > 0) {
      var ci = getCh(t);
      document.querySelectorAll(".apl-crow").forEach(function (r, i) {
        r.classList.toggle("act", i === ci);
      });
    }
  }

  audio.addEventListener("timeupdate", function () { updateProgress(audio.currentTime); });

  function setIcon(playing) {
    var svg = document.getElementById("apl-ico");
    var ns  = "http://www.w3.org/2000/svg";
    svg.innerHTML = "";
    if (playing) {
      var r1 = document.createElementNS(ns, "rect");
      r1.setAttribute("x","2");  r1.setAttribute("y","2");
      r1.setAttribute("width","4"); r1.setAttribute("height","12"); r1.setAttribute("rx","1");
      var r2 = document.createElementNS(ns, "rect");
      r2.setAttribute("x","10"); r2.setAttribute("y","2");
      r2.setAttribute("width","4"); r2.setAttribute("height","12"); r2.setAttribute("rx","1");
      svg.appendChild(r1); svg.appendChild(r2);
    } else {
      var poly = document.createElementNS(ns, "polygon");
      poly.setAttribute("points", "3,1 14,8 3,15");
      svg.appendChild(poly);
    }
  }

  pbtn.addEventListener("click", function () {
    if (audio.paused) { audio.play(); } else { audio.pause(); }
  });
  audio.addEventListener("play",  function () { setIcon(true); });
  audio.addEventListener("pause", function () { setIcon(false); });
  audio.addEventListener("ended", function () { setIcon(false); updateProgress(0); });

  var dragging = false;
  pw.addEventListener("mousedown", function (e) {
    dragging = true;
    var r = trk.getBoundingClientRect();
    audio.currentTime = Math.min(Math.max((e.clientX - r.left) / r.width, 0), 1) * TOTAL;
  });
  window.addEventListener("mouseup", function () { dragging = false; });
  pw.addEventListener("mousemove", function (e) {
    var r   = trk.getBoundingClientRect();
    var pct = Math.min(Math.max((e.clientX - r.left) / r.width, 0), 1);
    var t   = pct * TOTAL;
    tip.style.left    = (pct * 100) + "%";
    tip.textContent   = chapters.length > 0 ? fmt(t) + " · " + chapters[getCh(t)].name : fmt(t);
    tip.style.opacity = "1";
    if (dragging) audio.currentTime = t;
  });
  pw.addEventListener("mouseleave", function () { tip.style.opacity = "0"; dragging = false; });

  vr.addEventListener("input", function () {
    audio.volume = parseFloat(vr.value);
    vi.textContent = vr.value == 0 ? "🔇" : vr.value < 0.5 ? "🔉" : "🔊";
  });

  setIcon(false);
  updateProgress(0);
})();
</script>
</body>
</html>
